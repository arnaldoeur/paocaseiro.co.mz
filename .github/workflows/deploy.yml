name: 🎉 Deploy Pão Caseiro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🚀 Build and Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 🔐 Check Secrets
      run: |
        if [ -z "${{ secrets.FTP_SERVER }}" ]; then echo "❌ FTP_SERVER missing"; exit 1; fi
        if [ -z "${{ secrets.FTP_USERNAME }}" ]; then echo "❌ FTP_USERNAME missing"; exit 1; fi
        if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then echo "❌ FTP_PASSWORD missing"; exit 1; fi
        if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then echo "❌ VITE_SUPABASE_URL missing"; exit 1; fi
        if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then echo "❌ VITE_SUPABASE_ANON_KEY missing"; exit 1; fi
        echo "✅ All secrets are present"

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build Project
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

    - name: 🔍 Verify Build Output
      run: ls -R dist/

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: public_html/
        dangerous-clean-slate: true
