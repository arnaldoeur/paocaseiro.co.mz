        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            background: #f0f0f0;
            border-right: 1px solid #ccc;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #gallery {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            align-content: start;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
        }

        .section-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #555;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .product-item {
            padding: 8px 12px;
            background: white;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-item:hover {
            background: #e9e9e9;
        }

        .product-item.active {
            background: #3b2f2f;
            color: #d9a65a;
            border-color: #3b2f2f;
        }

        .product-item.done {
            border-left: 5px solid #4CAF50;
        }

        .image-card {
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            height: 250px;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-card:hover {
            transform: scale(1.02);
            transition: transform 0.1s;
        }

        .image-card.selected {
            border-color: #4CAF50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
        }

        .image-card.assigned::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            background: #4CAF50;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            items-center;
            justify-content: center;
            font-weight: bold;
        }

        #controls {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b2f2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        button:hover {
            background: #5a4a4a;
        }

        #output-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #output-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
        }
    </style>

        const productListEl = document.getElementById('product-list');
        const galleryEl = document.getElementById('gallery');
        let activeProduct = null;
        let mappings = {}; // { "Product Name": "filename.jpg" }

        // Initialize Product Sidebar
        let currentCategory = '';
        products.forEach(p => {
            if (p.category !== currentCategory) {
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = p.category;
                productListEl.appendChild(title);
                currentCategory = p.category;
            }

            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerText = p.name;
            div.dataset.name = p.name;
            div.onclick = () => selectProduct(div, p.name);
            productListEl.appendChild(div);
        });

        // Initialize Gallery
        images.forEach(img => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `<img src="/public/images/new_uploads/${img}" loading="lazy" />`;
            card.onclick = () => assignImage(card, img);
            galleryEl.appendChild(card);
        });

        function selectProduct(el, name) {
            // Determine if we are unselecting
            if (activeProduct === name) {
                return; // Already selected
            }

            // Clear previous active
            document.querySelectorAll('.product-item').forEach(d => d.classList.remove('active'));

            // Set new active
            el.classList.add('active');
            activeProduct = name;
        }

        function assignImage(card, filename) {
            if (!activeProduct) {
                alert('Please select a product on the left first!');
                return;
            }

            // Update data
            mappings[activeProduct] = filename;

            // Update UI - Mark product as done
            const prodEl = document.querySelector(`.product-item[data-name="${activeProduct}"]`);
            if (prodEl) prodEl.classList.add('done');

            // Update UI - Mark image as assigned
            // First, remove selection from other images IF we want clear indication (optional, maybe multiple products use same image? Allow it.)
            // card.classList.add('assigned'); // Let's not strictly enforce visual 'assigned' on image to allow re-use or correction

            // Visual feedback
            card.classList.add('selected');
            setTimeout(() => card.classList.remove('selected'), 500); // Pulse effect

            // Automatically move to next product?
            // autoSelectNext(); // Optional goodness
        }

        function generateJSON() {
            const json = JSON.stringify(mappings, null, 2);
            document.getElementById('json-output').value = json;
            document.getElementById('output-modal').style.display = 'flex';

            // Auto Copy
            document.getElementById('json-output').select();
            document.execCommand('copy');
            alert('Mappings copied to clipboard!');
